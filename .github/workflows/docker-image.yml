name: Docker Image CI

on:
  push:
    branches:
      - '**'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checks out the push
      uses: actions/checkout@v4
      with:
        submodules: true
        token: ${{ secrets.PAT_TOKEN }}
    
    - name: Set up QEMU (for multi-architecture support)
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Sanitize branch name
      id: branch
      run: |
        echo "BRANCH_TAG=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT

    - name: Build and Push Docker images (latest + version)
      run: |
        docker buildx build \
          --provenance=true \
          --sbom=true \
          -t gointerop/fhirsmith:${{ steps.branch.outputs.BRANCH_TAG }} \
          --push .

    - name: Docker Scout CVE scan (remote image)
      uses: docker/scout-action@v1
      continue-on-error: true   # não bloqueia urgência
      with:
        command: cves
        image: docker.io/gointerop/fhirsmith:${{ steps.branch.outputs.BRANCH_TAG }}
        only-severities: critical
        summary: true
    
    - name: Docker Scout Quickview (inclui policy quando disponível)
      uses: docker/scout-action@v1
      continue-on-error: true
      with:
        organization: gointerop
        command: quickview
        image: registry://docker.io/gointerop/fhirsmith:${{ steps.branch.outputs.BRANCH_TAG }}
        summary: true